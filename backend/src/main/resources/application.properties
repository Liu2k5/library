spring.application.name=library

# Database
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=library;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

server.port=8080

# Load private configuration (nếu có)
spring.config.import=optional:application.private.properties

# =========================
# Email
# =========================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# Session
# =========================

server.servlet.session.timeout=15m
spring.session.jdbc.initialize-schema=always

# =========================
# Auth
# =========================

app.reset-password-url=http://localhost:3000